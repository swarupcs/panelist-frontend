# Typecheck, lint, unit tests and a production build on every push and PR.
#
# The build is included because a page can typecheck and still fail to bundle —
# a bad import or a syntax error inside JSX has reached main that way before.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `tsc --noEmit` checks nothing here. This project uses project
      # references, and in that mode the root config only points at the
      # referenced projects — so the command exited 0 while five real type
      # errors sat in src/. Build mode is what actually reads them.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        # No VITE_API_URL: the client falls back to a same-origin '/api', which
        # is what a reverse-proxied deployment uses. Baking a real URL into a
        # CI build would only bake in the wrong one.
        run: pnpm build
